<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Blog — SiCore</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Inter',system-ui;-webkit-font-smoothing:antialiased;background:#000;color:#eee}
    header{max-width:1280px;margin:40px auto 0;padding:0 20px;display:flex;justify-content:space-between;align-items:center}
    a{color:inherit;text-decoration:none}
    .btn{display:inline-block;padding:10px 18px;border-radius:24px;background:#fff;color:#000;font-weight:700}
    main{max-width:1280px;margin:20px auto 80px;padding:0 20px}
    h1{font-size:46px;margin:20px 0}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .card{background:#0f0f0f;border:1px solid #1f1f1f;border-radius:12px;padding:20px}
    .card h3{margin:0 0 8px}
    .meta{color:#9aa0a6;font-size:13px;margin-bottom:8px}
    .excerpt{color:#cfcfcf;line-height:1.6;margin-bottom:16px}
    @media(max-width:1000px){.grid{grid-template-columns:1fr 1fr}}
    @media(max-width:640px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div>SiCore Research</div>
    <nav><a class="btn" href="index.html">Home</a></nav>
  </header>
  <main>
    <h1>All Posts</h1>
    <div id="grid" class="grid">Loading…</div>
  </main>
  <script>
    async function loadAll(){
      const grid=document.getElementById('grid');
      try{
        const res=await fetch('posts/posts.json',{cache:'no-store'});
        const list=await res.json();
        list.sort((a,b)=>new Date(b.date)-new Date(a.date));
        grid.innerHTML=list.map(p=>`
          <article class="card">
            <div class="meta">${new Date(p.date).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'2-digit'})}${p.tag?` • ${p.tag}`:''}</div>
            <h3>${p.title}</h3>
            <div class="excerpt">${p.excerpt||''}</div>
            <a class="btn" href="${p.url}">Read more →</a>
          </article>
        `).join('');
      }catch(e){
        grid.textContent='No posts yet.';
      }
    }
    loadAll();
  </script>
</body>
</html>
